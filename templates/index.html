<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KSeF XML Reader - Energa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; padding-top: 50px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header-title { color: #0d6efd; font-weight: bold; border-bottom: 2px solid #0d6efd; padding-bottom: 10px; margin-bottom: 30px; }
        .table-container { margin-top: 30px; overflow-x: auto; }
        .btn-upload { padding: 10px 25px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="header-title">Zliczanie Faktur KSeF Energa</h2>
        
        <div class="row g-3 align-items-center">
            <div class="col-md-8">
                <input type="file" id="fileInput" class="form-control form-control-lg" multiple accept=".xml">
            </div>
            <div class="col-md-4">
                <button onclick="uploadFiles()" class="btn btn-primary btn-lg btn-upload w-100">Przetwórz XML</button>
            </div>
        </div>
        
        <div class="mt-3 text-end">
            <button onclick="downloadCSV()" id="btnDownload" class="btn btn-success btn-lg" style="display:none;">Pobierz Raport CSV</button>
        </div>

        <div class="table-container">
            <table class="table table-hover table-bordered" id="resultsTable" style="display:none;">
                <thead class="table-dark">
                    <tr>
                        <th>Plik</th>
                        <th>Nr Faktury</th>
                        <th>Numer PPE</th>
                        <th>Taryfa</th>
                        <th>kWh</th>
                        <th>Brutto</th>
                        <th>Okres</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let lastData = [];

        async function uploadFiles() {
            const files = document.getElementById('fileInput').files;
            if (files.length === 0) return alert("Wybierz pliki!");

            const formData = new FormData();
            for(let f of files) { formData.append('files', f); }

            const resp = await fetch('/upload', { method: 'POST', body: formData });
            const result = await resp.json();

            if(result.success) {
                lastData = result.data;
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = '';
                
                result.data.forEach(row => {
                    tbody.innerHTML += `
                        <tr>
                            <td><small>${row.nazwa_pliku}</small></td>
                            <td>${row.numer_faktury}</td>
                            <td class="fw-bold text-primary">${row.numer_PPE}</td>
                            <td><span class="badge bg-secondary">${row.taryfa}</span></td>
                            <td>${row.zuzycie_kWh}</td>
                            <td>${row.kwota_brutto} PLN</td>
                            <td>${row.data_od} do ${row.data_do}</td>
                        </tr>`;
                });
                
                document.getElementById('resultsTable').style.display = 'table';
                document.getElementById('btnDownload').style.display = 'inline-block';
            }
        }

        async function downloadCSV() {
            const resp = await fetch('/download_csv', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: lastData })
            });
            const blob = await resp.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "raport_energa_ksef.csv";
            a.click();
        }
    </script>
</body>
</html>
