<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>KSeF Extractor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --main-purple: #5d5092; --dark-bg: #1a1a1a; --light-gray: #f8f9fa; }
        body { background-color: var(--main-purple); font-family: 'Inter', sans-serif; padding-bottom: 50px; }
        
        .container { max-width: 1100px; }
        .main-card { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); margin-top: 40px; }
        
        .header-bar { background: var(--dark-bg); color: white; padding: 12px 20px; border-radius: 8px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        
        .drop-zone { border: 2px dashed #ddd; border-radius: 10px; padding: 40px; text-align: center; cursor: pointer; transition: 0.2s; background: #fff; }
        .drop-zone:hover { background: #fafafa; border-color: var(--main-purple); }
        
        .stat-box { border-radius: 10px; padding: 20px; color: white; text-align: center; }
        .bg-blue { background: #0d6efd; }
        .bg-green { background: #198754; }
        
        .facture-item { border: 1px solid #eee; border-left: 5px solid var(--main-purple); border-radius: 6px; padding: 20px; margin-bottom: 15px; background: #fff; }
        
        .label-sm { font-size: 0.75rem; color: #888; text-transform: uppercase; font-weight: 600; }
        .data-text { font-size: 0.95rem; font-weight: 500; color: #333; }
        .ppe-highlight { color: var(--main-purple); font-weight: 700; font-family: monospace; font-size: 1.1rem; }
        .kwh-badge { background: #222; color: #fff; padding: 8px 16px; border-radius: 5px; font-weight: 700; font-size: 1.1rem; }
        .taryfa-tag { background: #6c757d; color: white; padding: 3px 8px; border-radius: 4px; font-size: 0.8rem; }
        
        #statsRow { margin-bottom: 30px; }
        .section-title-row { display: flex; justify-content: space-between; align-items: center; margin: 30px 0 15px 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-card">
        <div class="header-bar">
            <span class="fw-bold">Ekstraktor Danych KSeF</span>
            <a href="/login" class="btn btn-sm btn-outline-light">Wyloguj</a>
        </div>

        <div id="dropZone" class="drop-zone">
            <h4 class="mb-1">Przeciągnij i upuść pliki XML tutaj</h4>
            <p class="text-muted small">lub kliknij, aby wybrać z dysku</p>
            <input type="file" id="fileInput" multiple accept=".xml" style="display:none">
        </div>

        <div id="statsRow" class="row mt-4 g-3" style="display:none">
            <div class="col-md-6">
                <div class="stat-box bg-blue">
                    <div class="label-sm text-white-50">Liczba plików</div>
                    <h2 id="statCount" class="mb-0 fw-bold">0</h2>
                </div>
            </div>
            <div class="col-md-6">
                <div class="stat-box bg-green">
                    <div class="label-sm text-white-50">Suma kWh</div>
                    <h2 id="statKwh" class="mb-0 fw-bold">0</h2>
                </div>
            </div>
        </div>

        <div id="resultsWrapper" style="display:none">
            <div class="section-title-row">
                <h5 class="mb-0 fw-bold">Wyekstrahowane dane</h5>
                <button class="btn btn-dark btn-sm px-4" onclick="downloadCSV()">Pobierz CSV</button>
            </div>
            <div id="resultsList"></div>
        </div>
    </div>
</div>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    let lastResults = [];

    dropZone.onclick = () => fileInput.click();
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.borderColor = "#5d5092"; };
    dropZone.ondragleave = () => { dropZone.style.borderColor = "#ddd"; };
    dropZone.ondrop = (e) => { e.preventDefault(); handleFiles(e.dataTransfer.files); };
    fileInput.onchange = (e) => handleFiles(e.target.files);

    async function handleFiles(files) {
        const formData = new FormData();
        for(let f of files) formData.append('files', f);
        
        const res = await fetch('/upload', { method: 'POST', body: formData });
        const result = await res.json();
        
        if(result.success) {
            lastResults = result.data;
            document.getElementById('statsRow').style.display = 'flex';
            document.getElementById('resultsWrapper').style.display = 'block';
            document.getElementById('statCount').innerText = result.stats.count;
            document.getElementById('statKwh').innerText = result.stats.total_kwh.toLocaleString();

            const listCont = document.getElementById('resultsList');
            listCont.innerHTML = '';
            
            result.data.forEach(d => {
                listCont.innerHTML += `
                <div class="facture-item shadow-sm">
                    <div class="row align-items-center">
                        <div class="col-md-3">
                            <div class="label-sm">Plik</div>
                            <div class="data-text text-primary text-truncate">${d.filename}</div>
                            <div class="label-sm mt-2">Nr faktury</div>
                            <div class="data-text small">${d.numer_faktury}</div>
                        </div>
                        <div class="col-md-4 border-start border-end px-4">
                            <div class="label-sm">Nabywca</div>
                            <div class="data-text fw-bold text-uppercase">${d.nabywca}</div>
                            <div class="label-sm mt-2">NIP</div>
                            <div class="data-text">${d.nip_nabywca}</div>
                        </div>
                        <div class="col-md-5 text-end">
                            <div class="mb-2">
                                <span class="label-sm d-inline-block me-2">PPE:</span>
                                <span class="ppe-highlight">${d.ppe}</span>
                            </div>
                            <div class="d-flex justify-content-end align-items-center gap-3">
                                <div>
                                    <span class="taryfa-tag">${d.taryfa}</span>
                                    <div class="label-sm mt-1">${d.data_od} - ${d.data_do}</div>
                                </div>
                                <div class="kwh-badge">kWh: ${d.zuzycie_kwh.toLocaleString()}</div>
                            </div>
                        </div>
                    </div>
                </div>`;
            });
        }
    }

    async function downloadCSV() {
        const res = await fetch('/download_csv', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({data: lastResults})
        });
        const blob = await res.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = "raport_ksef.csv"; a.click();
    }
</script>
</body>
</html>
