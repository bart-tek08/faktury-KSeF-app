<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>KSeF Drag & Drop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f9; padding-top: 30px; }
        .drop-zone {
            border: 3px dashed #0d6efd;
            border-radius: 20px;
            padding: 50px;
            text-align: center;
            background: white;
            transition: 0.3s;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .drop-zone.dragover { background: #e9ecef; border-color: #0a58ca; }
        .table-container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="text-center mb-4 text-primary fw-bold">Energa KSeF Parser</h2>

        <div id="dropZone" class="drop-zone">
            <h3>Przeciągnij i upuść pliki XML tutaj</h3>
            <p class="text-muted">lub kliknij, aby wybrać z dysku</p>
            <input type="file" id="fileInput" multiple accept=".xml" style="display: none;">
        </div>

        <div class="text-center mb-4">
            <button onclick="downloadCSV()" id="btnDownload" class="btn btn-success btn-lg" style="display:none;">Pobierz Raport CSV</button>
        </div>

        <div class="table-container" id="resCont" style="display:none;">
            <table class="table table-hover">
                <thead class="table-light">
                    <tr>
                        <th>Nr Faktury</th>
                        <th>Nr Korekty</th>
                        <th>PPE</th>
                        <th>kWh</th>
                        <th>Brutto</th>
                        <th>Okres</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        let lastData = [];

        dropZone.onclick = () => fileInput.click();

        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('dragover'); };
        dropZone.ondragleave = () => dropZone.classList.remove('dragover');
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        };

        fileInput.onchange = (e) => handleFiles(e.target.files);

        async function handleFiles(files) {
            const formData = new FormData();
            for(let f of files) { formData.append('files', f); }

            const resp = await fetch('/upload', { method: 'POST', body: formData });
            const result = await resp.json();

            if(result.success) {
                lastData = result.data;
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = '';
                result.data.forEach(row => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${row.numer_faktury}</td>
                            <td class="text-danger">${row.numer_faktury_korygowanej || '-'}</td>
                            <td>${row.numer_PPE}</td>
                            <td>${row.zuzycie_kWh}</td>
                            <td>${row.kwota_brutto}</td>
                            <td>${row.data_od} - ${row.data_do}</td>
                        </tr>`;
                });
                document.getElementById('resCont').style.display = 'block';
                document.getElementById('btnDownload').style.display = 'inline-block';
            }
        }

        async function downloadCSV() {
            const resp = await fetch('/download_csv', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: lastData })
            });
            const blob = await resp.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = "raport_ksef.csv"; a.click();
        }
    </script>
</body>
</html>
